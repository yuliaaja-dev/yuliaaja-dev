<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline | Pong PWA</title>

<meta name="theme-color" content="#000000">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:
radial-gradient(circle at top,#151515,#000);

color:white;

text-align:center;

padding:20px;

}

.card{

width:min(95%,420px);

padding:35px;

border-radius:20px;

background:#101010;

border:1px solid #2d2d2d;

box-shadow:
0 0 35px rgba(0,0,0,.5);

}

.icon{

font-size:64px;

margin-bottom:18px;

}

h1{

margin-bottom:10px;

font-size:30px;

}

p{

color:#c6c6c6;

line-height:1.7;

margin-bottom:25px;

}

button{

padding:14px 24px;

font-size:16px;

font-weight:bold;

border:none;

border-radius:12px;

background:#0a84ff;

color:white;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

}

button:active{

transform:scale(.97);

}

small{

display:block;

margin-top:20px;

color:#888;

}

</style>

</head>

<body>

<div class="card">

<div class="icon">
📡
</div>

<h1>Kamu Sedang Offline</h1>

<p>
Game tidak dapat dimuat karena koneksi internet tidak tersedia
dan data belum tersimpan di cache perangkat.
</p>

<button onclick="location.reload()">
Coba Lagi
</button>

<small>
Pong PWA • Offline Mode
</small>

</div>

</body>
</html>
